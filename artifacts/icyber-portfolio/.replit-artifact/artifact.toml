kind = "web"
previewPath = "/"
title = "icyber.tech"
version = "1.0.0"
id = "artifacts/icyber-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18830

[services.development]
run = "pnpm --filter @workspace/icyber-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/icyber-portfolio", "run", "build" ]
publicDir = "artifacts/icyber-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18830"
BASE_PATH = "/"
